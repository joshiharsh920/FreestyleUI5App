specVersion: "4.0"
metadata:
  name: joshi.project1trial

type: application

server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com

        backend:
          - path: /odata
            url: http://localhost:4004

          - path: /sap
            url: http://ibssapserv52.ap-south-1.compute.amazonaws.com:8010